<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="converter-card">
    <div class="card-header">
      <h1>Currency Converter</h1>
    </div>
    
    <div class="converter-body">
      <div class="input-group">
        <label>Amount</label>
        <input type="number" id="amount" value="1" min="0" placeholder="Enter amount">
      </div>
      
      <div class="currency-row">
        <div class="currency-box">
          <label>From</label>
          <div class="currency-select">
            <img src="https://flagsapi.com/US/flat/64.png" id="from-flag">
            <select id="from-currency"></select>
          </div>
        </div>
        
        <button class="swap-btn" id="swap-btn" title="Swap">
          <i class="fa-solid fa-arrow-right-arrow-left"></i>
        </button>
        
        <div class="currency-box">
          <label>To</label>
          <div class="currency-select">
            <img src="https://flagsapi.com/PK/flat/64.png" id="to-flag">
            <select id="to-currency"></select>
          </div>
        </div>
      </div>
      
      <div class="result-display">
        <div class="result-main" id="result">Loading...</div>
        <div class="result-rate" id="rate-info"></div>
      </div>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
